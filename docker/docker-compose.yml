version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: cloudSaaS-db
    restart: always
    environment:
      POSTGRES_DB: cloudSaaSdb
      POSTGRES_USER: znaidi
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
volumes:
  postgres_data: