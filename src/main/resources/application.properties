server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/cloudSaaSdb
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql

# JWT
jwt.secret=${jwt_secret}
jwt.expiration=86400000

# Super Admin
app.superadmin.email=${super_admin_email}
app.superadmin.password=${super_admin_password}

# smtp Config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=znaidi2049@gmail.com
spring.mail.password=${smtp_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Azure Service Credential
azure.client-id=${azure_client_id}
azure.tenant-id=${azure_tenant_id}
azure.subscription-id=${azure_subscription_id}
azure.client-secret=${azure_client_secret}

# Azure Billing Account/Profile Ids
azure.billing-account-id=${azure_billing_account_id}
azure.billing-profile-id=${azure_billing_profile_id}

# Azure monitoring settings
azure.monitor.metrics-window-minutes=10
azure.cost.lookback-days=1